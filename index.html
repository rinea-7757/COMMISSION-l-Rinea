            </div>
            <button onclick="logoutAdmin()" class="text-xs bg-slate-200 hover:bg-slate-300 px-3 py-1.5 rounded-xl font-semibold text-slate-700 transition-all">관리창 닫기</button>
        </div>

        <div>

            <div class="grid grid-cols-4 gap-2" id="admin-slots-control">

        </div>

        <div class="flex flex-col gap-2">

            <button onclick="saveNotice()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs p-3 rounded-xl transition-all shadow-sm">공지사항 즉시 저장 및 동기화</button>
        </div>

<script>
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1515834246210519052/QPxttyyPB9sVui8ZJ4z1HuhogjrJVBtW13CP0NeygrkNhLR4CDgttOoaJAj4-0YJQ_Li";
    
    // 비밀번호 설정 (작가님이 원하시는 네자리 숫자 등으로 자유롭게 변경 가능합니다)
    const ADMIN_PASSWORD = "0000";

    let currentSlots = {};
    let currentNotice = "";

    document.addEventListener("DOMContentLoaded", () => {
        initData();
        checkAdminAccess();
        calculate();
    });

    // 로컬스토리지 데이터를 가져오거나 초기값 주입하는 세팅
    function initData() {
        const savedSlots = localStorage.getItem("commission_slots");
        if (savedSlots) {
            currentSlots = JSON.parse(savedSlots);
        } else {
            currentSlots = {...defaultSlots};
            localStorage.setItem("commission_slots", JSON.stringify(currentSlots));
        }

        const savedNotice = localStorage.getItem("commission_notice");
        if (savedNotice !== null) {
            currentNotice = savedNotice;
        } else {
            currentNotice = defaultNotice;
            localStorage.setItem("commission_notice", currentNotice);
        }

        renderLiveDisplays();
    }

    // 신청자 화면과 연동되는 메인 현황판 그리기
    function renderLiveDisplays() {
        const displayContainer = document.getElementById("live-slots-display");
        displayContainer.innerHTML = "";
        
        const months = ["Jan. 1월", "Feb. 2월", "Mar. 3월", "Apr. 4월", "May. 5월", "Jun. 6월", "Jul. 7월", "Aug. 8월", "Sep. 9월", "Oct. 10월", "Nov. 11월", "Dec. 12월"];
        
        for (let i = 1; i <= 12; i++) {
            const isOpen = currentSlots[i];
            const div = document.createElement("div");
            div.className = `p-3 rounded-xl border transition-all text-left flex flex-col justify-between ${isOpen ? 'bg-sky-50 border-sky-200 text-sky-900' : 'bg-slate-100 border-slate-200 text-slate-400'}`;
            
            div.innerHTML = `
                <span class="text-xs font-bold block">${months[i-1]}</span>
                <span class="text-[9px] font-extrabold tracking-wider uppercase mt-1 px-1.5 py-0.5 rounded-md inline-block w-max ${isOpen ? 'bg-sky-200 text-sky-800' : 'bg-slate-200 text-slate-500'}">
                    ${isOpen ? 'OPEN' : 'CLOSED'}
                </span>
            `;
            displayContainer.appendChild(div);
        }

        document.getElementById("live-notice-display").innerText = currentNotice;
    }

    // 주소창에 ?mode=admin 검사하여 관리자창 제어하기
    function checkAdminAccess() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'admin') {
            const pass = prompt("🔒 관리자 인증 계정\n비밀번호를 입력하세요:");
            if (pass === ADMIN_PASSWORD) {
                alert("🔓 인증 성공! 페이지 맨 아래에 관리자 패널이 잠금해제 되었습니다.");
                document.getElementById("secret-admin-panel").classList.remove("hidden");
                renderAdminControls();
            } else {
                alert("❌ 비밀번호가 올바르지 않습니다. 일반 모드로 표시합니다.");
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }
    }

    // 관리자 전용 제어 도구 렌더링하기
    function renderAdminControls() {
        const controlContainer = document.getElementById("admin-slots-control");
        controlContainer.innerHTML = "";

        for (let i = 1; i <= 12; i++) {
            const isOpen = currentSlots[i];
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = `p-2 rounded-xl border text-xs font-bold transition-all ${isOpen ? 'bg-sky-600 border-sky-600 text-white shadow-sm' : 'bg-white border-slate-300 text-slate-700 hover:bg-slate-50'}`;
            btn.innerText = `${i}월: ${isOpen ? 'OPEN' : 'CLOSED'}`;
            
            btn.onclick = () => {
                currentSlots[i] = !currentSlots[i];
                localStorage.setItem("commission_slots", JSON.stringify(currentSlots));
                renderLiveDisplays();
                renderAdminControls();
            };
            controlContainer.appendChild(btn);
        }

        document.getElementById("admin-notice-input").value = currentNotice;
    }

    // 메모장 글귀 보관하기
    function saveNotice() {
        const text = document.getElementById("admin-notice-input").value;
        currentNotice = text;
        localStorage.setItem("commission_notice", currentNotice);
        renderLiveDisplays();
        alert("📜 공지사항 수정사항이 정상 반영되었습니다!");
    }

    function logoutAdmin() {
        document.getElementById("secret-admin-panel").classList.add("hidden");
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    // --- 이하 기존 신청 폼 연산 및 전송 로직 유지 ---
    function handlePurposeChange(input) {
        document.querySelectorAll('#purpose-group label').forEach(label => {
            label.classList.remove('selected', 'ring-2', 'ring-indigo-600');
        });
        if (input.checked) {
            input.closest('label').classList.add('selected', 'ring-2', 'ring-indigo-600');
        }
        updatePrices();
    }

    function handleBaseChange(input) {
        document.querySelectorAll('#base-options label').forEach(label => {
            label.classList.remove('selected', 'ring-2', 'ring-indigo-600');
        });
        if (input.checked) {
            input.closest('label').classList.add('selected', 'ring-2', 'ring-indigo-600');
        }
        calculate();
    }

    function handleRushChange(input) {
        document.querySelectorAll('#rush-group label').forEach(label => {
            label.classList.remove('selected', 'ring-2', 'ring-indigo-600');
        });
        if (input.checked) {
            input.closest('label').classList.add('selected', 'ring-2', 'ring-indigo-600');
        }
        calculate();
    }

    function handleCheckboxChange(input) {
        const container = input.closest('.option-container');
        const qtyWrapper = container.querySelector('.qty-wrapper');
        
        if (input.checked) {
            container.classList.add('bg-indigo-50/50', 'border-indigo-300');
            if(qtyWrapper) qtyWrapper.classList.remove('hidden');
        } else {
            container.classList.remove('bg-indigo-50/50', 'border-indigo-300');
            if(qtyWrapper) qtyWrapper.classList.add('hidden');
            const qtyInput = container.querySelector('input[type="number"]');
            if(qtyInput) qtyInput.value = 1;
        }
        calculate();
    }

    function updatePrices() {
        const checkedPurpose = document.querySelector('input[name="purpose"]:checked');
        const factor = checkedPurpose ? parseInt(checkedPurpose.value) : 1;
        
        document.getElementById('desc-두상').innerText = `$${30 * factor} / ₩${(40000 * factor).toLocaleString()}`;
        document.getElementById('desc-반신').innerText = `$${60 * factor} / ₩${(80000 * factor).toLocaleString()}`;
        document.getElementById('desc-전신').innerText = `$${80 * factor} / ₩${(110000 * factor).toLocaleString()}`;
        calculate();
    }

    function calculate() {
        const checkedBase = document.querySelector('input[name="base_opt"]:checked');
        if (!checkedBase) {
            document.getElementById('total-price').innerText = "$0 / ₩0";
            return {usd: 0, krw: 0};
        }

        const baseName = checkedBase.value;
        const checkedPurpose = document.querySelector('input[name="purpose"]:checked');
        const factor = checkedPurpose ? parseInt(checkedPurpose.value) : 1;
        const checkedRush = document.querySelector('input[name="rush"]:checked');
        const rush = checkedRush ? parseFloat(checkedRush.value) : 0;
        
        let bu = basePrices[baseName].usd * factor;
        let bk = basePrices[baseName].krw * factor;
        let eu = 0; let ek = 0;

        if (document.getElementById('opt-person').checked) {
            const qty = parseInt(document.getElementById('qty-person').value) || 1;
            eu += Math.round(bu * 0.8) * qty; 
            ek += Math.round(bk * 0.8) * qty;
            document.getElementById('text-person').innerText = `+ $${Math.round(bu * 0.8)} / ₩${Math.round(bk * 0.8).toLocaleString()} (명당)`;
        } else {
            document.getElementById('text-person').innerText = `기본금의 80% 추가`;
        }

        const optIds = [
            {id: 'opt-bg', qtyId: 'qty-bg'}, 
            {id: 'opt-prop', qtyId: 'qty-prop'}, 
            {id: 'opt-detail', qtyId: 'qty-detail'}
        ];

        optIds.forEach(item => {
            const cb = document.getElementById(item.id);
            if (cb && cb.checked) {
                const values = cb.value.split(',');
                const qty = parseInt(document.getElementById(item.qtyId).value) || 1;
                eu += parseInt(values[0]) * qty; 
                ek += parseInt(values[1]) * qty;
            }
        });

        let finalUsd = (bu + eu) * (1 + rush);
        let finalKrw = (bk + ek) * (1 + rush);

        document.getElementById('total-price').innerText = `$${Math.round(finalUsd).toLocaleString()} / ₩${Math.round(finalKrw).toLocaleString()}`;
        return { usd: Math.round(finalUsd), krw: Math.round(finalKrw) };
    }

    function sendToDiscord() {
        const statusBox = document.getElementById('status-box');
        const submitBtn = document.getElementById('submit-button');

        statusBox.style.display = 'none';
        statusBox.className = 'p-4 rounded-xl text-sm font-medium border';

        const email = document.getElementById('user-email').value.trim();
        const checkedBase = document.querySelector('input[name="base_opt"]:checked');
        
        if (!email) { 
            statusBox.innerText = '⚠️ Applicant Email(신청자 이메일)을 입력해 주세요.';
            statusBox.classList.add('bg-rose-50', 'text-rose-800', 'border-rose-200');
            statusBox.style.display = "block";
            return; 
        }
        if (!checkedBase) { 
            statusBox.innerText = 'Base Options(기본 옵션)을 선택해 주세요.';
            statusBox.classList.add('bg-rose-50', 'text-rose-800', 'border-rose-200');
            statusBox.style.display = "block";
            return; 
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = `전송 중... (Sending...)`;

        const purposeText = document.querySelector('input[name="purpose"]:checked').parentElement.textContent.replace(/\s+/g, ' ').trim();
        const charDesc = document.getElementById('char-desc').value.trim() || '미작성';
        const baseText = checkedBase.value;
        const rushText = document.querySelector('input[name="rush"]:checked').getAttribute('data-name');
        const deadline = document.getElementById('deadline').value || '미지정';
        const otherRequests = document.getElementById('other-requests').value.trim() || '없음';

        let extras = [];
        if (document.getElementById('opt-person').checked) {
            extras.push(`인물 추가 (${document.getElementById('qty-person').value}명)`);
        }
        if (document.getElementById('opt-bg').checked) {
            extras.push(`배경 추가 (${document.getElementById('qty-bg').value}개)`);
        }
        if (document.getElementById('opt-prop').checked) {
            extras.push(`단순 소품 및 디자인 (${document.getElementById('qty-prop').value}개)`);
        }
        if (document.getElementById('opt-detail').checked) {
            extras.push(`고디테일 요소 (${document.getElementById('qty-detail').value}개)`);
        }
        const extrasText = extras.length > 0 ? extras.join(', ') : '없음';

        const prices = calculate();
        const bt = "```";

        const discordPayload = {
            embeds: [{
                title: "일감 받아라",
                color: 4930162, 
                fields: [
                    { name: "📧 신청자 이메일 / 디스코드 아이디", value: email, inline: true },
                    { name: "⚖️ 이용 용도", value: purposeText, inline: true },
                    { name: "📐 기본 옵션", value: baseText, inline: true },
                    { name: "➕ 추가 옵션 (수량)", value: extrasText, inline: false },
                    { name: "⚡ 빠른 마감 여부", value: rushText, inline: true },
                    { name: "📅 희망 마감일", value: deadline, inline: true },
                    { name: "📝 캐릭터 외관 설정", value: bt + "\n" + charDesc + "\n" + bt, inline: false },
                    { name: "💭 기타 문의내용", value: bt + "\n" + otherRequests + "\n" + bt, inline: false },
                    { name: "💰 예상 최종 견적", value: `**$${prices.usd.toLocaleString()} / ₩${prices.krw.toLocaleString()}**`, inline: false }
                ],
                timestamp: new Date().toISOString()
            }]
        };

        const imageFile = document.getElementById('char-image').files[0];

        if (imageFile) {
            const formData = new FormData();
            formData.append("payload_json", JSON.stringify(discordPayload));
            formData.append("file", imageFile);

            fetch(DISCORD_WEBHOOK_URL, { method: "POST", body: formData })
            .then(res => handleResponse(res))
            .catch(err => handleError(err));
        } else {
            fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(discordPayload)
            })
            .then(res => handleResponse(res))
            .catch(err => handleError(err));
        }

        function handleResponse(response) {
            if (response.ok) {
                statusBox.innerText = "신청서와 첨부 이미지가 성공적으로 전송되었습니다!";
                statusBox.className = "p-4 rounded-xl text-sm font-medium border bg-emerald-50 text-emerald-800 border-emerald-200";
                statusBox.style.display = "block";
                
                document.getElementById('user-email').value = '';
                document.getElementById('char-desc').value = '';
                document.getElementById('char-image').value = '';
                document.getElementById('deadline').value = '';
                document.getElementById('other-requests').value = '';
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = false; });
                document.querySelectorAll('.qty-wrapper').forEach(w => w.classList.add('hidden'));
                document.querySelectorAll('.option-container').forEach(c => c.className = "flex flex-col p-3 rounded-xl border border-slate-200 bg-white transition-all option-container");
                calculate();
            } else {
                throw new Error("서버 응답 에러");
            }
            resetSubmitBtn();
        }

        function handleError(error) {
            statusBox.innerHTML = `<div>❌ <strong>전송 오류 발생!</strong> 인터넷 연결 상태를 확인해 주세요.</div>`;
            statusBox.className = "p-4 rounded-xl text-sm font-medium border bg-rose-50 text-rose-800 border-rose-200";
            statusBox.style.display = "block";
            resetSubmitBtn();
        }

        function resetSubmitBtn() {
            submitBtn.disabled = false;
            submitBtn.innerHTML = "신청서 전송하기 (Submit Order)";
        }
    }
</script>
