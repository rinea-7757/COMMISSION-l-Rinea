        const defaultSlots = {

            7: false, 8: true, 9: true, 10: true, 11: true, 12: true
        };

        // 초기 기본 공지사항 데이터
        const defaultNotice = `[공지사항 및 약관]\n\n• 모든 저작권은 작가에게 있습니다.\n• 작업 기간은 최소 1주에서 최대 4주 소요됩니다.\n• 슬롯 현황을 확인하신 후 신청해 주세요!`;

            <div class="flex flex-col gap-1.5">

                    <label class="relative flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 bg-white cursor-pointer select-none hover:bg-slate-50 transition-all text-center">

            <div class="flex flex-col gap-1.5">

                <div class="space-y-2">

                    <div class="flex flex-col p-3 rounded-xl border border-slate-200 bg-white transition-all option-container">

                            <span class="text-[11px] text-slate-500">수량:</span>
                            <input type="number" id="qty-bg" value="1" min="1" max="10" class="w-14 rounded-lg border border-slate-200 p-1 text-center text-xs outline-none focus:border-indigo-500" onchange="calculate()">

                    </div>

                    <div class="flex flex-col p-3 rounded-xl border border-slate-200 bg-white transition-all option-container">

                                <input type="checkbox" id="opt-prop" data-name="단순 소품 및 디자인" value="10,15000" class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500" onchange="handleCheckboxChange(this)">

                    <div class="flex flex-col p-3 rounded-xl border border-slate-200 bg-white transition-all option-container">

                            <span class="text-[11px] text-slate-500">수량:</span>
                            <input type="number" id="qty-detail" value="1" min="1" max="10" class="w-14 rounded-lg border border-slate-200 p-1 text-center text-xs outline-none focus:border-indigo-500" onchange="calculate()">

            <div class="flex flex-col gap-1.5">

            <div class="flex flex-col gap-1.5">

                </label>

            </div>

            <div class="rounded-2xl bg-slate-900 p-5 flex justify-between items-center text-white">

                    <span class="text-[10px] font-bold tracking-widest text-indigo-400 block uppercase">Estimated Cost</span>
                    <span class="text-xs text-slate-400">예상 총 견적액</span>

                <div class="text-xl font-extrabold text-right text-indigo-200" id="total-price">$0 / ₩0</div>
            </div>

            <div id="status-box" class="p-4 rounded-xl text-sm font-medium border hidden transition-all"></div>

            <button id="submit-button" class="w-full rounded-xl bg-indigo-600 p-4 text-sm font-bold text-white shadow-md hover:bg-indigo-500 active:scale-95 transition-all flex items-center justify-center gap-2" onclick="sendToDiscord()">

    <div id="secret-admin-panel" class="rounded-2xl border-2 border-dashed border-indigo-300 bg-indigo-50/40 p-6 hidden space-y-5">
        <div class="flex justify-between items-center border-b border-indigo-100 pb-3">
            <div>
                <h2 class="text-base font-bold text-indigo-900">🔒 작가 전용 비밀 관리 패널</h2>
                <p class="text-xs text-indigo-500 font-medium">컴맹 전용 - 여기서 바꾸면 위 현황판이 즉시 업데이트됩니다.</p>
            </div>
            <button onclick="logoutAdmin()" class="text-xs bg-slate-200 hover:bg-slate-300 px-3 py-1.5 rounded-xl font-semibold text-slate-700 transition-all">관리창 닫기</button>
        </div>

        <div>
            <label class="text-xs font-bold text-indigo-900 block mb-2">📅 마우스 클릭 슬롯 변경 (OPEN ↔ CLOSED 토글)</label>
            <div class="grid grid-cols-4 gap-2" id="admin-slots-control">
                </div>
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-indigo-900 block">📜 공지사항 & 약관 메모장 편집</label>
            <textarea id="admin-notice-input" class="w-full h-32 rounded-xl border border-indigo-200 p-3 text-xs outline-none focus:border-indigo-500 bg-white leading-relaxed resize-y font-sans"></textarea>
            <button onclick="saveNotice()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs p-3 rounded-xl transition-all shadow-sm">공지사항 즉시 저장 및 동기화</button>
        </div>
    </div>

</div>

<script>
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1515834246210519052/QPxttyyPB9sVui8ZJ4z1HuhogjrJVBtW13CP0NeygrkNhLR4CDgttOoaJAj4-0YJQ_Li";
    
    // 비밀번호 설정 (원하시는 다른 글자나 숫자로 변경 가능합니다)
    const ADMIN_PASSWORD = "0000";

    let currentSlots = {};
    let currentNotice = "";

    document.addEventListener("DOMContentLoaded", () => {
        initData();
        checkAdminAccess();
        calculate();
    });

    // 로컬스토리지 데이터를 가져오거나 초기값 주입하는 세팅
    function initData() {
        const savedSlots = localStorage.getItem("commission_slots");
        if (savedSlots) {
            currentSlots = JSON.parse(savedSlots);
        } else {
            currentSlots = {...defaultSlots};
            localStorage.setItem("commission_slots", JSON.stringify(currentSlots));
        }

        const savedNotice = localStorage.getItem("commission_notice");
        if (savedNotice !== null) {
            currentNotice = savedNotice;
        } else {
            currentNotice = defaultNotice;
            localStorage.setItem("commission_notice", currentNotice);
        }

        renderLiveDisplays();
    }

    // 신청자 화면과 연동되는 메인 현황판 그리기
    function renderLiveDisplays() {
        const displayContainer = document.getElementById("live-slots-display");
        displayContainer.innerHTML = "";
        
        const months = ["Jan. 1월", "Feb. 2월", "Mar. 3월", "Apr. 4월", "May. 5월", "Jun. 6월", "Jul. 7월", "Aug. 8월", "Sep. 9월", "Oct. 10월", "Nov. 11월", "Dec. 12월"];
        
        for (let i = 1; i <= 12; i++) {
            const isOpen = currentSlots[i];
            const div = document.createElement("div");
            div.className = `p-3 rounded-xl border transition-all text-left flex flex-col justify-between ${isOpen ? 'bg-sky-50 border-sky-200 text-sky-900' : 'bg-slate-100 border-slate-200 text-slate-400'}`;
            
            div.innerHTML = `
                <span class="text-xs font-bold block">${months[i-1]}</span>
                <span class="text-[9px] font-extrabold tracking-wider uppercase mt-1 px-1.5 py-0.5 rounded-md inline-block w-max ${isOpen ? 'bg-sky-200 text-sky-800' : 'bg-slate-200 text-slate-500'}">
                    ${isOpen ? 'OPEN' : 'CLOSED'}
                </span>
            `;
            displayContainer.appendChild(div);
        }

        document.getElementById("live-notice-display").innerText = currentNotice;
    }

    // 주소창에 ?mode=admin 검사하여 관리자창 제어하기
    function checkAdminAccess() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'admin') {
            const pass = prompt("🔒 관리자 인증 계정\n비밀번호를 입력하세요:");
            if (pass === ADMIN_PASSWORD) {
                alert("🔓 인증 성공! 페이지 맨 아래에 관리자 패널이 잠금해제 되었습니다.");
                document.getElementById("secret-admin-panel").classList.remove("hidden");
                renderAdminControls();
            } else {
                alert("❌ 비밀번호가 올바르지 않습니다. 일반 모드로 표시합니다.");
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }
    }

    // 관리자 전용 제어 도구 렌더링하기
    function renderAdminControls() {
        const controlContainer = document.getElementById("admin-slots-control");
        controlContainer.innerHTML = "";

        for (let i = 1; i <= 12; i++) {
            const isOpen = currentSlots[i];
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = `p-2 rounded-xl border text-xs font-bold transition-all ${isOpen ? 'bg-sky-600 border-sky-600 text-white shadow-sm' : 'bg-white border-slate-300 text-slate-700 hover:bg-slate-50'}`;
            btn.innerText = `${i}월: ${isOpen ? 'OPEN' : 'CLOSED'}`;
            
            btn.onclick = () => {
                currentSlots[i] = !currentSlots[i];
                localStorage.setItem("commission_slots", JSON.stringify(currentSlots));
                renderLiveDisplays();
                renderAdminControls();
            };
            controlContainer.appendChild(btn);
        }

        document.getElementById("admin-notice-input").value = currentNotice;
    }
